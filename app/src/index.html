<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="icon" type="image/png" href="/img/favicon.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zenith</title>
</head>

<body class="settingup">
  <!-- HUD Header bar -->
  <div id="hud-header">
    <span id="hud-title">ZENITH</span>
    <div style="display:flex;align-items:center;gap:20px;">
      <span id="hud-status" style="font-size:11px;letter-spacing:0.2em;color:#4A6A7A;">ONLINE</span>
      <span id="hud-clock" style="font-size:13px;color:#4A6A7A;"></span>
    </div>
  </div>

  <!-- Three-panel HUD layout -->
  <div id="hud-main">

    <!-- LEFT: Orb + voice control -->
    <div id="hud-left">
      <div id="orb-container">
        <div id="zenith-orb" class="idle"></div>
        <div id="orb-label">IDLE</div>
        <button id="zenith-mic-btn">◉ VOICE</button>
      </div>
    </div>

    <!-- CENTRE: Leon chat (keep existing chat markup here) -->
    <div id="hud-center">
      <div id="leon-chat-root">
        <main>
          <div id="feed">
            <p id="no-bubble" class="hide">
              You can start to interact with Zenith, don't be shy.
            </p>
          </div>
          <div id="suggestions-container"></div>
          <div id="is-typing">
            <div class="circle"></div>
            <div class="circle"></div>
            <div class="circle"></div>
          </div>
          <div id="input-container">
            <div id="mic-container">
              <button id="mic-button"></button>
              <div id="sonar"></div>
            </div>
            <label for="utterance"></label>
            <input type="text" id="utterance" autocomplete="off" autofocus />
            <small>
              Use <kbd>↑</kbd> <kbd>↓</kbd> to browse history; <kbd>↵</kbd> to
              submit;
              <kbd>alt + c to listen.</kbd>
            </small>
          </div>
        </main>
        <footer>
          <div id="logo"></div>
          <div id="version">
            <small>v</small>
          </div>
          <div id="discord">
            <small class="italic">
              <a href="https://discord.gg/" target="_blank">Join us on Discord</a>
            </small>
          </div>
        </footer>
      </div>
    </div>

    <!-- RIGHT: Tool monitor -->
    <div id="hud-right">
      <div class="monitor-header">TOOL MONITOR</div>
      <div id="tool-monitor-list"></div>
    </div>

  </div>

  <!-- KEEP ALL EXISTING SCRIPT TAGS BELOW UNCHANGED -->
  <script type="module" src="/js/main.js"></script>
</body>

</html>
