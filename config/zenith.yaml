# Zenith Configuration
# Values below use environment-variable placeholders from .env.

server:
  port: 1337
  data_dir: "~/.zenith"

voice:
  stt_provider: "groq_whisper"      # groq_whisper | google | deepgram
  tts_provider: "google_cloud"      # google_cloud | kokoro_local
  wake_word: "zenith"
  language: "en-US"
  livekit_url: "${LIVEKIT_URL}"     # from env: LIVEKIT_URL

llm:
  primary: "gemini"
  fallback: ["groq", "openrouter"]

  gemini:
    api_key: "${GOOGLE_API_KEY}"    # from env: GOOGLE_API_KEY
    model: "gemini-2.5-flash"

  groq:
    api_key: "${GROQ_API_KEY}"      # from env: GROQ_API_KEY
    model: "llama-3.3-70b-versatile"

  openrouter:
    api_key: "${OPENROUTER_API_KEY}" # from env: OPENROUTER_API_KEY
    model: "meta-llama/llama-3.3-70b-instruct"

personality:
  name: "Zenith"
  style: "friday"                   # tony-stark friday style
  core_traits: ["loyal", "precise", "proactive", "efficient"]
  address_user_as: "sir"

skills:
  enabled: true
  nlp_confidence_threshold: 0.6    # below this, route to LLM
  auto_learn: false                 # future scope

memory:
  db_type: "tinydb"                 # tinydb | sqlite
  db_path: "~/.zenith/zenith.db"
  chat_history_limit: 100
  knowledge_vault: true             # enable long-term fact storage
  per_skill_storage: true           # enable per-skill namespaced storage

vision:
  ocr:
    enabled: true
    engine: "tesseract"             # tesseract
    language: "eng"
    tesseract_cmd: null             # optional: path to tesseract binary, null means auto-detect
  face_auth:
    enabled: true
    engine: "lbph"                  # LBPH (Local Binary Patterns Histograms)
    confidence_threshold: 80.0      # lower = stricter match
    model_dir: "~/.zenith/face_models"
  object_detection:
    enabled: true
    engine: "yolov8n"               # YOLOv8 nano model
    confidence_threshold: 0.5

desktop:
  automation:
    enabled: true
    engine: "pyautogui"
    failsafe: true                  # move mouse to corner to abort
    pause: 0.1                      # delay between actions (seconds)
  screenshots_dir: "~/.zenith/screenshots"

browser:
  automation:
    enabled: true
    engine: "playwright"            # playwright chromium
    headless: true

rate_limiting:
  max_requests_per_minute: 30       # utterances per client per minute
  warn_after_requests: 20           # soft warning threshold
  block_duration_seconds: 60        # block duration after limit exceeded
  backoff_multiplier: 2.0           # multiply block duration on repeated violations
  max_block_duration_seconds: 3600  # cap for block duration

ui:
  theme: "stark"                    # stark | minimal | neon
  port: 1337
